<svg width="625" height="300" viewBox="0 0 625 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FE548B" stop-opacity="1" />
      <stop offset="50%" stop-color="#E4477D" stop-opacity="1" />
      <stop offset="100%" stop-color="#D63A6F" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd93d" stop-opacity="1" />
      <stop offset="100%" stop-color="#f6c23e" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="1" />
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="625" height="300" rx="24" fill="url(#bgGradient)"/>
  
  <circle cx="580" cy="68" r="120" fill="url(#blueAccent)" opacity="0.08"/>
  <circle cx="70" cy="240" r="110" fill="url(#accentGradient)" opacity="0.08"/>
  <circle cx="520" cy="225" r="95" fill="url(#blueAccent)" opacity="0.06"/>
  
  <g opacity="0.2">
    <text x="40" y="53" font-size="36" transform="rotate(-15 40 53)">🎮</text>
    <text x="570" y="83" font-size="34" transform="rotate(20 570 83)">🎯</text>
    <text x="580" y="240" font-size="30" transform="rotate(-10 580 240)">🎲</text>
    <text x="50" y="270" font-size="34" transform="rotate(15 50 270)">🕹️</text>
  </g>
  
  <g opacity="0.25">
    <text x="560" y="53" font-size="30" transform="rotate(10 560 53)">💰</text>
    <text x="60" y="143" font-size="27" transform="rotate(-20 60 143)">💵</text>
    <text x="540" y="180" font-size="32" transform="rotate(15 540 180)">💳</text>
    <text x="45" y="248" font-size="30" transform="rotate(-12 45 248)">💎</text>
  </g>
  
  <g opacity="0.12">
    <circle cx="110" cy="60" r="3" fill="#ffd93d"/>
    <circle cx="495" cy="90" r="3" fill="#4facfe"/>
    <circle cx="100" cy="195" r="3" fill="#ffd93d"/>
    <circle cx="515" cy="255" r="3" fill="#4facfe"/>
  </g>
  
  <g transform="translate(312.5, 50)">
    <text x="0" y="0" font-size="32" font-weight="700" fill="white" text-anchor="middle" filter="url(#softShadow)" letter-spacing="1.2" dominant-baseline="hanging">遊んで楽しい</text>
    <text x="0" y="48" font-size="40" font-weight="900" fill="url(#accentGradient)" text-anchor="middle" filter="url(#subtleGlow)" letter-spacing="1.8" dominant-baseline="hanging">ポイントどんどん貯まる!</text>
  </g>
  
  <g transform="translate(35, 180)">
    <circle cx="35" cy="28" r="28" fill="url(#accentGradient)" opacity="0.18"/>
    <text x="35" y="28" font-size="28" text-anchor="middle" filter="url(#subtleGlow)" dominant-baseline="middle">🎁</text>
    <text x="70" y="9" font-size="18" font-weight="600" fill="white" filter="url(#softShadow)" dominant-baseline="hanging">無料登録で</text>
    <text x="70" y="33" font-size="18" font-weight="600" fill="url(#accentGradient)" filter="url(#softShadow)" dominant-baseline="hanging">ポイントGET!</text>
  </g>
  
  <g transform="translate(225, 180)">
    <circle cx="35" cy="28" r="28" fill="url(#blueAccent)" opacity="0.18"/>
    <text x="35" y="28" font-size="28" text-anchor="middle" filter="url(#subtleGlow)" dominant-baseline="middle">💳</text>
    <text x="70" y="9" font-size="18" font-weight="600" fill="white" filter="url(#softShadow)" dominant-baseline="hanging">カード開設で</text>
    <text x="70" y="33" font-size="18" font-weight="600" fill="url(#blueAccent)" filter="url(#softShadow)" dominant-baseline="hanging">大ボーナス!</text>
  </g>
  
  <g transform="translate(415, 180)">
    <circle cx="35" cy="28" r="28" fill="url(#accentGradient)" opacity="0.18"/>
    <text x="35" y="28" font-size="28" text-anchor="middle" filter="url(#subtleGlow)" dominant-baseline="middle">💴</text>
    <text x="70" y="9" font-size="18" font-weight="600" fill="white" filter="url(#softShadow)" dominant-baseline="hanging">1P=1円で還元、</text>
    <text x="70" y="33" font-size="18" font-weight="600" fill="white" filter="url(#softShadow)" dominant-baseline="hanging">換金手数料無料</text>
  </g>
</svg>